version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexus-postgres
    environment:
      POSTGRES_DB: nexus_warehouse
      POSTGRES_USER: nexus_admin
      POSTGRES_PASSWORD: dev_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data
      - ./data/schemas:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_admin -d nexus_warehouse"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    container_name: nexus-dashboard
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./dashboard:/app/dashboard
      - ./src:/app/src

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    container_name: nexus-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./src:/app/src

volumes:
  nexus_pgdata:
