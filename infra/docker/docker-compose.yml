# ──────────────────────────────────────────────────────────────
# Yellowbird Telemetry — Production Docker Compose
# ──────────────────────────────────────────────────────────────
# Usage: docker compose -f infra/docker/docker-compose.yml up --build
# ──────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    env_file: ../../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexus_net

  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: runtime
    env_file: ../../.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../../data:/app/data
    restart: unless-stopped
    networks:
      - nexus_net

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: runtime
    # Routes not yet implemented — skeleton FastAPI app
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: ../../.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexus_net

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app
      - api
    restart: unless-stopped
    networks:
      - nexus_net

volumes:
  postgres_data:

networks:
  nexus_net:
